- name: roboshop instances management
  hosts : local
  connection: local
  vars:
    instances: ["mongodb-SG", "Redis", "mysql", "rabbitmq", "catalogue", "user", "cart", "Shipping", "payment", "frontend"]
    image_id: ami-0220d79f3f480ecf5
    domine_name: uvraj.online
    instances_action: create
  tasks:
    - name: create ec2 instances
      amazon.aws.ec2_instance:
        name: "roboshop-{{ item }}"
        image_id: "{{ image_id }}"
        instance_type: t3.micro
        security_groups:
          - "Roboshop-{{ item }}"
          - roboshop-common
      loop: "{{ instances }}"
      register: ec2_output
      when: instances_action == "create"

    # - name: print output
    #   debug:
    #     msg: "{{ ec2_output }}"

    # - name: create route53 record
    #   debug:
    #     msg: "instances name: {{ item.item }} Private IP: {{ item.instances[0].private_ip_address }}"
    #   loop: "{{ ec2_output.results }}"

    - name: create route53 record
      amazon.aws.route53:
        state: present
        zone: "{{ domine_name }}"
        record: "{{ item.item}}.{{ domine_name }}"
        type: A
        ttl: 1
        value: "{{ item.instances[0].private_ip_address }}"
        overwrite: true
      loop: "{{ ec2_output.results }}"
      when: instances_action == "create"


    - name: create route53 record for frontend
      amazon.aws.route53:
        state: present
        zone: "{{ domine_name }}"
        record: "{{ domine_name }}"
        type: A
        ttl: 1
        value: "{{ item.instances[0].public_ip_address }}"
        overwrite: true
      loop: "{{ ec2_output.results }}"
      when: 
        - item.item == "frontend"
        - instances_action == "create"

    - name: delete route53 records
      amazon.aws.route53:
        state: absent
        zone: "{{ domine_name }}"
        record: "{{ item.item}}.{{ domine_name }}"
        type: A
        ttl: 1
      loop: "{{ instances }}"
      when: instances_action == "delete"

    - name: delete route53 records for frontend
      amazon.aws.route53:
        state: absent
        zone: "{{ domine_name }}"
        record: "{{ domine_name }}"
        type: A
        ttl: 1
      loop: "{{ instances }}"
      when:
        - instances_action == "delete"
        - item == "frontend"

    - name: delete ec2 instances
      amazon.aws.ec2_instance:
        state: absent
        name: "roboshop-{{ item }}"
        wait: false
      loop: "{{ instances }}"
      when: instances_action == "delete"


      

